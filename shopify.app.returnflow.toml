# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4addb0c909a94f4e1ae6ddd91cc98434"
name = "ReturnFlow"
application_url = "https://return-flow-prod.vercel.app"
embedded = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "shop/update" ]
  uri = "/webhooks/shop/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,read_products,write_products,write_gift_cards,write_orders"

[auth]
redirect_urls = [ "https://return-flow-prod.vercel.app/auth/callback" ]

[app_proxy]
url = "https://return-flow-prod.vercel.app/proxy"
subpath = "returns"
prefix = "apps"
