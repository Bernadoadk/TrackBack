# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4addb0c909a94f4e1ae6ddd91cc98434"
name = "TrackBack"
application_url = "https://trackback-prod.vercel.app"
embedded = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "shop/update" ]
  uri = "/webhooks/shop/update"

  # ── Mandatory GDPR compliance webhooks ─────────────────────────────────
  [webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/customers/data_request"
  customer_deletion_url     = "/webhooks/customers/redact"
  shop_deletion_url         = "/webhooks/shop/redact"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,read_products,write_gift_cards,write_orders,write_products,read_returns,write_returns,read_store_credit_accounts,read_store_credit_account_transactions,write_store_credit_account_transactions,write_draft_orders,read_draft_orders"

[auth]
redirect_urls = [
  "https://trackback-prod.vercel.app/auth/callback",
  "https://trackback-prod.vercel.app/auth/shopify/callback",
  "https://trackback-prod.vercel.app/api/auth/callback"
]

[app_proxy]
url = "https://trackback-prod.vercel.app/proxy"
subpath = "returns"
prefix = "apps"

[pos]
embedded = false
